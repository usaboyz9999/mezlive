name: Build Android APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm install -g eas-cli

      - name: Setup EAS
        run: eas login --token ${{ secrets.EXPO_TOKEN }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        run: |
          eas build --platform android --profile universal --non-interactive --no-wait=false
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: apk
          path: ./builds

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./builds/*.apk
          name: Release ${{ github.ref_name }}
          body: |
            ## 📱 mezlive ${{ github.ref_name }}
            
            ### ✅ التحديثات:
            - تحسينات الأداء والاستقرار
            - دعم أفضل لأجهزة التلفاز
            
            ### 🔗 التحميل:
            - [تحميل APK مباشر](https://github.com/${{ github.repository }}/releases/latest/download/mezlive.apk)
            
            ### 📋 متطلبات النظام:
            - أندرويد 5.0 أو أحدث
            - مساحة تخزين: 50 ميجابايت
            - اتصال إنترنت للبث
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save build information
        run: |
          mkdir -p builds
          echo "Build completed at $(date -u)" > builds/build-info.txt
          echo "Commit: ${{ github.sha }}" >> builds/build-info.txt
          echo "Version: ${{ github.ref_name }}" >> builds/build-info.txt
          echo "Workflow: ${{ github.workflow }}" >> builds/build-info.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mezlive-android-apk
          path: ./builds/
          retention-days: 30
