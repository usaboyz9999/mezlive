// android/build.gradle — Expo SDK 54 / React Native 0.76
// ✅ نسخة مصححة: إصدارات صريحة + بلجن Expo + Kotlin 2.0.21

buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 21
        compileSdkVersion = 34
        targetSdkVersion = 34
        kotlinVersion = "2.0.21"
        ndkVersion = "26.1.10909125"
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        // ✅ إضافة رقم الإصدار صراحةً (مطلوب لتجنب خطأ التقييم)
        classpath("com.android.tools.build:gradle:8.2.1")
        
        // ✅ بلجن React Native الرسمي (بدون رقم إصدار - يُحمّل تلقائياً)
        classpath("com.facebook.react:react-native-gradle-plugin")
        
        // ✅ Kotlin Plugin مع المتغير المحدد أعلاه
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

// ✅ استخدام بلجن Expo الجذري (يدعم autolinking و kotlinVersion)
apply plugin: "expo-root-project"
apply from: "expo-autolinking.gradle"
