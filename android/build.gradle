// Top-level build file — Expo SDK 54 / React Native 0.76
// ✅ تم إصلاح تعارض Kotlin KSP بحذف expo-gradle-plugin من Maven

buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion    = 21
        compileSdkVersion = 35
        targetSdkVersion  = 34
        kotlinVersion    = "2.0.21"
        ndkVersion       = "26.1.10909125"
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        // ✅ AGP — بدون تثبيت إصدار، Gradle يختار التوافق تلقائياً
        classpath("com.android.tools.build:gradle")
        // ✅ React Native Gradle Plugin (مطلوب لـ RN 0.76)
        classpath("com.facebook.react:react-native-gradle-plugin")
        // ✅ Kotlin 2.0.21 — متوافق مع KSP المستخدم في Expo SDK 54
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        // ❌ تم حذف: expo.gradle.plugin:expo-gradle-plugin:0.2.0
        //    كان يجلب Kotlin 1.9.24 سراً ويكسر KSP
    }
}

// ✅ expo-autolinking مُعدّ في settings.gradle عبر useExpoModules()
apply plugin: "com.facebook.react.rootproject"
