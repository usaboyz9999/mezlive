apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

// ✅ react {} فارغ — لا نضيف enableBundleCompression (محذوفة من RN 0.75+)
react {
    // EAS Build يُعدّ الـ bundle تلقائياً
}

def enableProguardInReleaseBuilds = false

android {
    ndkVersion        rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk        rootProject.ext.compileSdkVersion

    namespace "com.mezlive.app"

    defaultConfig {
        applicationId "com.mezlive.app"
        minSdk        rootProject.ext.minSdkVersion
        targetSdk     rootProject.ext.targetSdkVersion
        versionCode   3
        versionName   "1.0.2"
    }

    signingConfigs {
        debug {
            storeFile     file('debug.keystore')
            storePassword 'android'
            keyAlias      'androiddebugkey'
            keyPassword   'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig   signingConfigs.debug
            minifyEnabled   enableProguardInReleaseBuilds
            proguardFiles   getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            // ✅ تحسين: تعطيل ضغط الموارد لتجنب أخطاء غير متوقعة
            shrinkResources false
        }
    }

    // ✅ إضافة Kotlin options صراحةً للتوافق مع Kotlin 2.0.21
    kotlinOptions {
        jvmTarget = "11"
    }

    // ✅ تحسين: تعيين Java compatibility
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

// ✅ إضافة repositories صراحةً لضمان العثور على جميع الاعتمادات
repositories {
    google()
    mavenCentral()
}

dependencies {
    // الإصدار يُحدَّد تلقائياً من React Native Gradle Plugin
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
}

// ✅ تحميل native_modules.gradle مع معالجة أخطاء المسار
def reactNativePath = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile()
apply from: new File(reactNativePath, "../react-native-community/cli-platform-android/native_modules.gradle")
applyNativeModulesAppBuildGradle(project)
