apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

// ✅ react {} بدون enableBundleCompression (محذوفة من RN 0.75+)
react {
    // EAS Build يُعدّ الـ bundle تلقائياً — لا تضف شيئاً هنا
}

def enableProguardInReleaseBuilds = false

android {
    ndkVersion        rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk        rootProject.ext.compileSdkVersion

    namespace "com.mezlive.app"

    defaultConfig {
        applicationId "com.mezlive.app"
        minSdk       rootProject.ext.minSdkVersion
        targetSdk    rootProject.ext.targetSdkVersion
        versionCode  3
        versionName  "1.0.2"
    }

    signingConfigs {
        debug {
            storeFile    file('debug.keystore')
            storePassword 'android'
            keyAlias     'androiddebugkey'
            keyPassword  'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // EAS Build يُوقّع الـ APK بمفتاحه الخاص تلقائياً
            signingConfig   signingConfigs.debug
            minifyEnabled   enableProguardInReleaseBuilds
            proguardFiles   getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // الإصدار يُحدَّد تلقائياً من React Native Gradle Plugin
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
}

apply from: new File(
    ["node", "--print", "require.resolve('@react-native-community/cli-platform-android/package.json', { paths: [require.resolve('react-native/package.json')] })"]
        .execute(null, rootDir).text.trim(),
    "../native_modules.gradle"
)
applyNativeModulesAppBuildGradle(project)
