workflows:
  expo-android:
    name: Build APK (Cloud Only)
    instance_type: linux
    environment:
      node: 20.10.0
      java: 17
      
    scripts:
      - name: 1. Install Dependencies
        script: npm install --legacy-peer-deps
        
      - name: 2. Generate Android Project
        script: npx expo prebuild --platform android --clean
        
      - name: 3. Build Release APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace
          
    artifacts:
      - android/app/build/outputs/**/*.apk
      
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
