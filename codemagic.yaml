workflows:
  android-apk:
    name: Build Android APK
    max_build_duration: 90
    instance_type: mac_mini_m2
    
    environment:
      node: 20.10.0
      java: 17
      xcode: latest
      cocoapods: default
      
    scripts:
      - name: Install Node dependencies
        script: |
          npm install --legacy-peer-deps
          
      - name: Prebuild Android with clean cache
        script: |
          # ✅ تنظيف الكاش لضمان تطبيق إعدادات Kotlin الجديدة
          rm -rf android/.gradle android/app/build node_modules/.cache
          npx expo prebuild --platform android --clean --no-install
          
      - name: Debug Kotlin configuration (optional - for info only)
        script: |
          # ✅ هذه الخطوة للمعلومات فقط ولا توقف البناء إذا فشلت
          echo "🔍 Checking Kotlin configuration..."
          if [ -f "android/build.gradle" ]; then
            echo "📄 Contents of android/build.gradle (relevant lines):"
            grep -E "kotlin|Kotlin" android/build.gradle || echo "⚠️ No kotlin lines found"
          fi
          if [ -f "android/gradle.properties" ]; then
            echo "📄 Contents of android/gradle.properties:"
            grep -E "kotlin" android/gradle.properties || echo "⚠️ No kotlin props found"
          fi
          # ✅ لا نستخدم 'exit 1' هنا حتى لا يفشل البناء
          echo "✅ Debug step completed"
          
      - name: Build Release APK
        script: |
          cd android
          chmod +x gradlew
          # ✅ استخدام --no-daemon لتجنب مشاكل الذاكرة في CI
          ./gradlew assembleRelease --no-daemon --stacktrace
          
    artifacts:
      - android/app/build/outputs/**/*.apk
      
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
