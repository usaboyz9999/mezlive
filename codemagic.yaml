workflows:
  android-apk:
    name: Build Android APK
    max_build_duration: 90
    instance_type: mac_mini_m2
    
    environment:
      node: 20.10.0
      java: 17
      xcode: latest
      cocoapods: default
      
    scripts:
      - name: Install Node dependencies
        script: |
          npm install --legacy-peer-deps
          
      - name: Clean and Prebuild Android
        script: |
          # ✅ تنظيف شامل لضمان تطبيق إعدادات Kotlin الجديدة
          echo "🧹 Cleaning old build artifacts..."
          rm -rf android/.gradle android/app/build android/build node_modules/.cache .expo
          
          echo "🔄 Running expo prebuild with clean flag..."
          npx expo prebuild --platform android --clean --no-install
          
          # ✅ التحقق من أن kotlinVersion مُعرّف في build.gradle
          echo "🔍 Verifying kotlinVersion in android/build.gradle..."
          if grep -q "kotlinVersion = '2.0.21'" android/build.gradle; then
            echo "✅ kotlinVersion 2.0.21 found in ext block"
          else
            echo "⚠️ kotlinVersion not found, adding manually as fallback..."
            # إضافة يدوية كحل احتياطي
            sed -i '' '/buildscript {/a\
    ext {\
        kotlinVersion = '\''2.0.21'\''\
    }' android/build.gradle 2>/dev/null || true
          fi
          
      - name: Build Release APK
        script: |
          cd android
          chmod +x gradlew
          # ✅ استخدام --no-daemon و --stacktrace للتشخيص الدقيق
          ./gradlew assembleRelease --no-daemon --stacktrace
          
    artifacts:
      - android/app/build/outputs/**/*.apk
      
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
